<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin - GymVision AI</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			background: #0f0f10;
			color: #fff;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
			padding: 20px;
		}
		.header {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			padding: 30px;
			border-radius: 12px;
			margin-bottom: 30px;
		}
		.header h1 {
			font-size: 28px;
			margin-bottom: 10px;
		}
		.account-item {
			background: #1a1a1b;
			border: 1px solid #2a2a2b;
			border-radius: 8px;
			padding: 20px;
			margin-bottom: 15px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		.exercise-item {
			background: #1a1a1b;
			border: 1px solid #2a2a2b;
			border-radius: 8px;
			padding: 20px;
			margin-bottom: 15px;
		}
		.exercise-item h3 {
			margin-bottom: 8px;
			color: #fff;
			display: flex;
			align-items: center;
			gap: 10px;
		}
		.exercise-item p {
			color: #888;
			margin: 4px 0;
			font-size: 14px;
		}
		.exercise-badge {
			padding: 4px 8px;
			border-radius: 4px;
			font-size: 11px;
			font-weight: 600;
			margin-left: 8px;
		}
		.badge-custom {
			background: #f59e0b;
			color: white;
		}
		.badge-cardio {
			background: #10b981;
			color: white;
		}
		.badge-bodyweight {
			background: #3b82f6;
			color: white;
		}
		.stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 15px;
			margin-bottom: 30px;
		}
		.stat-card {
			background: #1a1a1b;
			border: 1px solid #2a2a2b;
			border-radius: 8px;
			padding: 20px;
		}
		.stat-card h3 {
			font-size: 14px;
			color: #888;
			margin-bottom: 8px;
		}
		.stat-card .stat-value {
			font-size: 32px;
			font-weight: 700;
			color: #667eea;
		}
		.account-info h3 {
			margin-bottom: 8px;
			color: #fff;
		}
		.account-info p {
			color: #888;
			margin: 4px 0;
			font-size: 14px;
		}
		.actions {
			display: flex;
			gap: 10px;
		}
		.btn {
			padding: 12px 24px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-size: 18px;
			font-weight: 600;
			min-width: 60px;
		}
		.btn-approve {
			background: #10b981;
			color: white;
		}
		.btn-approve:hover {
			background: #059669;
		}
		.btn-reject {
			background: #ef4444;
			color: white;
		}
		.btn-reject:hover {
			background: #dc2626;
		}
		.status {
			padding: 6px 12px;
			border-radius: 20px;
			font-size: 12px;
			font-weight: 600;
			margin-right: 10px;
		}
		.status.verified {
			background: #10b981;
			color: white;
		}
		.status.unverified {
			background: #f59e0b;
			color: white;
		}
		.loading {
			text-align: center;
			padding: 40px;
			color: #888;
		}
		.error {
			background: #fee;
			color: #c33;
			padding: 15px;
			border-radius: 6px;
			margin-bottom: 20px;
		}
		.password-modal {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(0, 0, 0, 0.9);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 10000;
		}
		.password-modal.hidden {
			display: none;
		}
		.password-box {
			background: #1a1a1b;
			border: 1px solid #2a2a2b;
			border-radius: 12px;
			padding: 30px;
			max-width: 400px;
			width: 90%;
		}
		.password-box h2 {
			margin-bottom: 20px;
			text-align: center;
		}
		.password-input {
			width: 100%;
			padding: 12px;
			background: #0f0f10;
			border: 1px solid #2a2a2b;
			border-radius: 6px;
			color: #fff;
			font-size: 16px;
			margin-bottom: 15px;
		}
		.password-input:focus {
			outline: none;
			border-color: #667eea;
		}
		.password-error {
			color: #ef4444;
			font-size: 14px;
			margin-bottom: 15px;
			display: none;
		}
		.password-error.show {
			display: block;
		}
		.password-submit {
			width: 100%;
			padding: 12px;
			background: #667eea;
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}
		.password-submit:hover {
			background: #5568d3;
		}
		.admin-content {
			display: none;
		}
		.admin-content.authenticated {
			display: block;
		}
	</style>
</head>
<body>
	<!-- Password Modal -->
	<div id="password-modal" class="password-modal">
		<div class="password-box">
			<h2>🔐 Admin Access</h2>
			<p style="color: #888; margin-bottom: 20px; text-align: center;">Enter password to access admin dashboard</p>
			<input type="password" id="password-input" class="password-input" placeholder="Password" autocomplete="off">
			<div id="password-error" class="password-error">Incorrect password. Please try again.</div>
			<button id="password-submit" class="password-submit" onclick="checkPassword()">Enter</button>
		</div>
	</div>

	<!-- Admin Content (hidden until authenticated) -->
	<div id="admin-content" class="admin-content">
	<div class="header">
		<h1>🔐 Admin Dashboard</h1>
		<p>Manage gym accounts and view exercise analytics</p>
	</div>

	<div style="margin-bottom: 30px; display: flex; gap: 10px;">
		<button class="btn" id="tab-gym-accounts" onclick="switchTab('gym-accounts')" style="background: #667eea; color: white;">Gym Accounts</button>
		<button class="btn" id="tab-exercises" onclick="switchTab('exercises')" style="background: #1a1a1b; color: #888; border: 1px solid #2a2a2b;">All Exercises</button>
	</div>

	<div id="error-message" class="error" style="display: none;"></div>
	
	<!-- Gym Accounts Tab -->
	<div id="tab-content-gym-accounts">
		<div id="accounts-list" class="loading">Loading gym accounts...</div>
	</div>

	<!-- Exercises Tab -->
	<div id="tab-content-exercises" style="display: none;">
		<div id="exercises-list" class="loading">Loading exercises...</div>
	</div>
	</div>

	<script>
		const ADMIN_PASSWORD = 'Kipbroodje2003!';
		const AUTH_KEY = 'admin_authenticated';
		
		let accounts = [];
		let exercisesData = null;
		let currentTab = 'gym-accounts';

		// Check if already authenticated
		function checkAuth() {
			const authenticated = sessionStorage.getItem(AUTH_KEY) === 'true';
			if (authenticated) {
				showAdminContent();
			} else {
				showPasswordModal();
			}
		}

		function showPasswordModal() {
			document.getElementById('password-modal').classList.remove('hidden');
			document.getElementById('admin-content').classList.remove('authenticated');
			document.getElementById('password-input').focus();
		}

		function showAdminContent() {
			document.getElementById('password-modal').classList.add('hidden');
			document.getElementById('admin-content').classList.add('authenticated');
			loadAccounts();
		}

		function switchTab(tab) {
			currentTab = tab;
			
			// Update button styles
			document.getElementById('tab-gym-accounts').style.background = tab === 'gym-accounts' ? '#667eea' : '#1a1a1b';
			document.getElementById('tab-gym-accounts').style.color = tab === 'gym-accounts' ? 'white' : '#888';
			document.getElementById('tab-gym-accounts').style.border = tab === 'gym-accounts' ? 'none' : '1px solid #2a2a2b';
			
			document.getElementById('tab-exercises').style.background = tab === 'exercises' ? '#667eea' : '#1a1a1b';
			document.getElementById('tab-exercises').style.color = tab === 'exercises' ? 'white' : '#888';
			document.getElementById('tab-exercises').style.border = tab === 'exercises' ? 'none' : '1px solid #2a2a2b';
			
			// Show/hide content
			document.getElementById('tab-content-gym-accounts').style.display = tab === 'gym-accounts' ? 'block' : 'none';
			document.getElementById('tab-content-exercises').style.display = tab === 'exercises' ? 'block' : 'none';
			
			if (tab === 'exercises') {
				loadExercises();
			}
		}

		function checkPassword() {
			const input = document.getElementById('password-input');
			const password = input.value;
			const errorDiv = document.getElementById('password-error');
			
			if (password === ADMIN_PASSWORD) {
				sessionStorage.setItem(AUTH_KEY, 'true');
				showAdminContent();
			} else {
				errorDiv.classList.add('show');
				input.value = '';
				input.focus();
			}
		}

		// Allow Enter key to submit password
		document.addEventListener('DOMContentLoaded', () => {
			const passwordInput = document.getElementById('password-input');
			if (passwordInput) {
				passwordInput.addEventListener('keypress', (e) => {
					if (e.key === 'Enter') {
						checkPassword();
					}
				});
			}
			checkAuth();
		});

		async function loadAccounts() {
			const container = document.getElementById('accounts-list');
			container.innerHTML = '<div class="loading">Loading gym accounts...</div>';

			try {
				const response = await fetch('/api/admin/gym-accounts');
				
				if (!response.ok) {
					const errorText = await response.text();
					container.innerHTML = '<div class="error">Error ' + response.status + ': ' + errorText + '</div>';
					return;
				}

				const data = await response.json();
				accounts = data.accounts || [];

				if (accounts.length === 0) {
					container.innerHTML = '<div class="loading">No gym accounts found.<br><br>Gym accounts will appear here after they register.</div>';
					return;
				}

				renderAccounts();
			} catch (error) {
				container.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
			}
		}

		function renderAccounts() {
			const container = document.getElementById('accounts-list');
			container.innerHTML = accounts.map(account => `
				<div class="account-item">
					<div class="account-info">
						<h3>${escapeHtml(account.gym_name || 'Unknown')}</h3>
						<p><strong>Email:</strong> ${escapeHtml(account.email || 'N/A')}</p>
						${account.contact_name ? `<p><strong>Contact:</strong> ${escapeHtml(account.contact_name)}${account.contact_phone ? ` (${escapeHtml(account.contact_phone)})` : ''}</p>` : ''}
						<p><strong>Created:</strong> ${formatDate(account.created_at)}</p>
					</div>
					<div class="actions">
						${account.is_verified ? '<span class="status verified">✓ Verified</span>' : '<span class="status unverified">⚠ Unverified</span>'}
						${!account.is_verified ? `
							<button class="btn btn-approve" onclick="approve('${account.user_id}')">✓ Approve</button>
						` : ''}
						<button class="btn btn-reject" onclick="reject('${account.user_id}')">✗ Reject</button>
					</div>
				</div>
			`).join('');
		}

		async function approve(userId) {
			if (!confirm('Approve this gym account?')) return;

			try {
				const response = await fetch(`/api/admin/gym-accounts/${userId}/approve`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' }
				});

				if (response.ok) {
					loadAccounts();
				} else {
					alert('Failed to approve: ' + await response.text());
				}
			} catch (error) {
				alert('Error: ' + error.message);
			}
		}

		async function reject(userId) {
			if (!confirm('Reject this gym account? They will lose access.')) return;

			try {
				const response = await fetch(`/api/admin/gym-accounts/${userId}/reject`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' }
				});

				if (response.ok) {
					loadAccounts();
				} else {
					alert('Failed to reject: ' + await response.text());
				}
			} catch (error) {
				alert('Error: ' + error.message);
			}
		}

		function escapeHtml(text) {
			const div = document.createElement('div');
			div.textContent = text;
			return div.innerHTML;
		}

		function formatDate(dateString) {
			if (!dateString) return 'N/A';
			const date = new Date(dateString);
			return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
		}

		async function loadExercises() {
			const container = document.getElementById('exercises-list');
			container.innerHTML = '<div class="loading">Loading exercises...</div>';

			try {
				const response = await fetch('/api/admin/exercises');
				
				if (!response.ok) {
					const errorText = await response.text();
					container.innerHTML = '<div class="error">Error ' + response.status + ': ' + errorText + '</div>';
					return;
				}

				const data = await response.json();
				exercisesData = data;

				renderExercises();
			} catch (error) {
				container.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
			}
		}

		function renderExercises() {
			if (!exercisesData) return;

			const container = document.getElementById('exercises-list');
			
			// Stats
			const statsHtml = `
				<div class="stats-grid">
					<div class="stat-card">
						<h3>Total Workouts</h3>
						<div class="stat-value">${exercisesData.total_workouts || 0}</div>
					</div>
					<div class="stat-card">
						<h3>Unique Exercises</h3>
						<div class="stat-value">${exercisesData.total_unique_exercises || 0}</div>
					</div>
					<div class="stat-card">
						<h3>Custom Exercises</h3>
						<div class="stat-value">${exercisesData.custom_exercises_count || 0}</div>
					</div>
					<div class="stat-card">
						<h3>Standard Exercises</h3>
						<div class="stat-value">${exercisesData.standard_exercises_count || 0}</div>
					</div>
				</div>
			`;

			// Custom exercises section
			const customExercises = exercisesData.custom_exercises || [];
			const customHtml = customExercises.length > 0 ? `
				<h2 style="margin: 30px 0 20px 0; color: #fff;">Custom Exercises (${customExercises.length})</h2>
				<p style="color: #888; margin-bottom: 20px;">These are exercises that users have created manually. Consider adding popular ones to the standard exercise list.</p>
				${customExercises.map(ex => `
					<div class="exercise-item">
						<h3>
							${escapeHtml(ex.name)}
							<span class="exercise-badge badge-custom">Custom</span>
							${ex.is_cardio ? '<span class="exercise-badge badge-cardio">Cardio</span>' : ''}
							${ex.is_bodyweight ? '<span class="exercise-badge badge-bodyweight">Bodyweight</span>' : ''}
						</h3>
						<p><strong>Used in:</strong> ${ex.usage_count} workout${ex.usage_count !== 1 ? 's' : ''}</p>
						${ex.muscles && ex.muscles.length > 0 ? `<p><strong>Muscles:</strong> ${ex.muscles.join(', ')}</p>` : ''}
						${ex.key ? `<p style="color: #666; font-size: 12px;"><strong>Key:</strong> ${escapeHtml(ex.key)}</p>` : ''}
					</div>
				`).join('')}
			` : '<p style="color: #888; margin: 30px 0;">No custom exercises found yet.</p>';

			// All exercises (top 50 most used)
			const allExercises = (exercisesData.all_exercises || []).slice(0, 50);
			const allExercisesHtml = `
				<h2 style="margin: 30px 0 20px 0; color: #fff;">Most Used Exercises (Top 50)</h2>
				${allExercises.map(ex => `
					<div class="exercise-item">
						<h3>
							${escapeHtml(ex.name)}
							${ex.is_custom ? '<span class="exercise-badge badge-custom">Custom</span>' : ''}
							${ex.is_cardio ? '<span class="exercise-badge badge-cardio">Cardio</span>' : ''}
							${ex.is_bodyweight ? '<span class="exercise-badge badge-bodyweight">Bodyweight</span>' : ''}
						</h3>
						<p><strong>Used in:</strong> ${ex.usage_count} workout${ex.usage_count !== 1 ? 's' : ''}</p>
						${ex.muscles && ex.muscles.length > 0 ? `<p><strong>Muscles:</strong> ${ex.muscles.join(', ')}</p>` : ''}
					</div>
				`).join('')}
			`;

			container.innerHTML = statsHtml + customHtml + allExercisesHtml;
		}

	</script>
</body>
</html>
